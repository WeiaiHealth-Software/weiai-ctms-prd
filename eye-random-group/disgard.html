<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>临床试验预约系统 - 双端原型</title>
	<link rel="icon" href="logo.svg" type="image/svg+xml">
	<script src="https://cdn.tailwindcss.com"></script>
	<!-- 引入图标库 -->
	<script src="https://unpkg.com/lucide@latest"></script>
	<style>
			/* 隐藏滚动条但保持滚动功能 */
			.no-scrollbar::-webkit-scrollbar {
				display: none;
			}
			.no-scrollbar {
				-ms-overflow-style: none;
				scrollbar-width: none;
			}
			/* 模拟手机边框光泽 */
			.phone-frame {
				box-shadow: 0 0 0 10px #1f2937, 0 20px 50px -10px rgba(0,0,0,0.5);
			}
			/* 简单的淡入动画 */
			.fade-in {
				animation: fadeIn 0.3s ease-in-out;
			}
			@keyframes fadeIn {
				from { opacity: 0; transform: translateY(5px); }
				to { opacity: 1; transform: translateY(0); }
			}
	</style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center font-sans py-8">
	<div class="flex items-center gap-4 text-center mb-10">
		<img src="logo.svg" alt="logo" class="w-12 h-12 mb-2">
		<h1 class="text-3xl font-bold text-slate-800 mb-2">惟翎·中央随机化系统招募端</h1>
	</div>

	<div class="flex flex-wrap justify-center gap-16 items-start w-full max-w-6xl px-4">
		<!-- 医生端 -->
		<div class="flex flex-col gap-6 items-center space-y-4">
			<!-- 手机容器 -->
			<div class="relative w-[320px] h-[640px] bg-white rounded-[3rem] phone-frame overflow-hidden flex flex-col">
					<!-- 刘海 -->
					<div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-32 h-6 bg-gray-800 rounded-b-xl z-50"></div>
					<!-- 状态栏 -->
					<div class="h-8 bg-white w-full flex justify-between items-center px-6 pt-2 text-[10px] font-bold z-40">
							<span id="doc-clock">09:41</span>
							<div class="flex gap-1">
									<div class="w-4 h-4 rounded-full bg-gray-200"></div>
									<div class="w-4 h-4 rounded-full bg-gray-200"></div>
							</div>
					</div>
					
					<!-- 屏幕内容区域 -->
					<div id="doctor-screen" class="flex-1 bg-gray-50 overflow-y-auto no-scrollbar relative flex flex-col">
							<!-- 动态渲染区域 -->
					</div>
			</div>
			<h2 class="text-xl font-bold text-blue-600 flex items-center gap-2">
				<i data-lucide="stethoscope"></i> 医生视角
			</h2>
		</div>

		<!-- CRC端 -->
		<div class="flex flex-col gap-6 items-center space-y-4">
			<!-- 手机容器 -->
			<div class="relative w-[320px] h-[640px] bg-white rounded-[3rem] phone-frame overflow-hidden flex flex-col">
					<!-- 刘海 -->
					<div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-32 h-6 bg-gray-800 rounded-b-xl z-50"></div>
					<!-- 状态栏 -->
					<div class="h-8 bg-white w-full flex justify-between items-center px-6 pt-2 text-[10px] font-bold z-40">
							<span id="crc-clock">09:41</span>
							<div class="flex gap-1">
									<div class="w-4 h-4 rounded-full bg-gray-200"></div>
									<div class="w-4 h-4 rounded-full bg-gray-200"></div>
							</div>
					</div>

					<!-- 屏幕内容区域 -->
					<div id="crc-screen" class="flex-1 bg-gray-50 overflow-y-auto no-scrollbar relative flex flex-col">
							<!-- 动态渲染区域 -->
					</div>
			</div>
			<h2 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
				<i data-lucide="clipboard-check"></i> CRC 视角
			</h2>
		</div>
	</div>

<!-- JavaScript 逻辑 -->
<script>
	// --- 1. 数据与状态管理 (State Management) ---
	const state = {
		// 模拟数据库
		centers: [
			{ id: 'c1', name: '中心医院眼科' },
			{ id: 'c2', name: '第一人民医院' }
		],
		projects: [
			{ id: 'p1', centerId: 'c1', name: '近视防控临床试验', status: '进行中' },
			{ id: 'p2', centerId: 'c1', name: '高度近视队列研究', status: '进行中' },
			{ id: 'p3', centerId: 'c2', name: '青光眼筛查AI验证', status: '已结束' }
		],
		groups: [
			{
				id: 'g1', projectId: 'p1', name: '试验组 A', drug: '低浓度阿托品 0.01%',
				enrolled: 45, target: 100,
				dimensions: [
					{ name: '性别:男 | 年龄:4～7岁 | 屈光:-1.50～0.00D', current: 8, target: 15 },
					{ name: '性别:女 | 年龄:8～10岁 | 屈光:0.01～1.50D', current: 12, target: 20 },
					{ name: '性别:男 | 年龄:11～14岁 | 屈光:-1.50～0.00D', current: 5, target: 15 },
					{ name: '性别:女 | 年龄:4～7岁 | 屈光:0.01～1.50D', current: 20, target: 50 }
				]
			},
			{
				id: 'g2', projectId: 'p1', name: '对照组 B', drug: '安慰剂',
				enrolled: 42, target: 100,
				dimensions: [
					{ name: '性别:男 | 年龄:4～7岁 | 屈光:-1.50～0.00D', current: 10, target: 15 },
					{ name: '性别:女 | 年龄:8～10岁 | 屈光:0.01～1.50D', current: 10, target: 20 },
					{ name: '性别:男 | 年龄:11～14岁 | 屈光:-1.50～0.00D', current: 8, target: 15 },
					{ name: '性别:女 | 年龄:4～7岁 | 屈光:0.01～1.50D', current: 14, target: 50 }
				]
			}
		],
		messages: [
			{ id: 'm1', title: '患者[张伟]已完成入组确认', content: 'CRC张协调员已确认资料，请知悉。', time: '10:30', read: false },
			{ id: 'm2', title: '新项目启动会议通知', content: '请于周五下午参加新项目启动会议。', time: '昨天', read: true }
		],
		appointments: [
			{ id: '101', name: '张伟', phone: '13800138000', gender: '', age: '', diopter: '', status: 'PENDING_INFO', doctor: '李医生', time: '10:30', projectId: 'p1' },
			{ id: '102', name: '王芳', phone: '13912345678', gender: '女', age: '28', diopter: '-3.50', status: 'PENDING_CONFIRM', doctor: '李医生', time: '09:15', projectId: 'p1' },
			{ id: '103', name: '李强', phone: '13766668888', gender: '男', age: '7', diopter: '-1.50', status: 'ENROLLED', doctor: '李医生', time: '昨天', projectId: 'p1', group: 'g1' },
			{ id: '104', name: '赵敏', phone: '13999990000', gender: '女', age: '10', diopter: '-2.00', status: 'ENROLLED', doctor: '李医生', time: '昨天', projectId: 'p1', group: 'g2' }
		],
		
		// 医生端状态
		doc: {
			isLoggedIn: false,
			currentTab: 'home', // home, records, profile
			recordTab: 'todo', // todo, done
			view: 'list', // list, form, switch_context, messages, my_centers, my_projects, group_detail
			formData: { name: '', phone: '', gender: '', age: '', diopter: '' },
			centerId: 'c1',
			projectId: 'p1',
			selectedGroupId: null
		},

		// CRC端状态
		crc: {
			isLoggedIn: false,
			currentTab: 'home', // home, records, profile
			recordTab: 'todo', // todo, done
			selectedApptId: null, // null means list view
			view: 'list', // list, switch_context, messages, my_centers, my_projects, group_detail
			centerId: 'c1',
			projectId: 'p1',
			selectedGroupId: null
		}
	};

	// --- 2. 核心渲染控制器 (Render Controllers) ---
	function renderAll() {
		renderDoctor();
		renderCRC();
		lucide.createIcons(); // 重新渲染图标
	}

	// 渲染医生端
	function renderDoctor() {
		const screen = document.getElementById('doctor-screen');
		
		if (!state.doc.isLoggedIn) {
			screen.innerHTML = renderLogin('doc');
			return;
		}

		let content = '';
		// 底部导航 (在非某些特定页面显示)
		const showNav = ['list', 'form'].includes(state.doc.view) && ['home', 'records', 'profile'].includes(state.doc.currentTab);
		const nav = showNav ? renderBottomNav('doc', state.doc.currentTab) : '';

		if (state.doc.view === 'switch_context') {
			content = renderSwitchContext('doc');
		} else if (state.doc.view === 'messages') {
			content = renderMessages('doc');
		} else if (state.doc.view === 'my_centers') {
			content = renderSimpleList('doc', '我的中心', state.centers.map(c => ({ title: c.name, sub: '关联时间: 2023-01-01' })));
		} else if (state.doc.view === 'my_projects') {
			content = renderSimpleList('doc', '我的项目', state.projects.map(p => ({ title: p.name, sub: p.status, badge: p.status })));
		} else if (state.doc.view === 'group_detail') {
			content = renderGroupDetail('doc');
		} else if (state.doc.view === 'form') { // 优先渲染表单
			content = renderDocForm();
		} else {
			// Tab Views
			if (state.doc.currentTab === 'home') {
				content = renderDocHome();
			} else if (state.doc.currentTab === 'records') {
				content = renderRecords('doc');
			} else {
				content = renderProfile('doc', '李医生');
			}
		}

		screen.innerHTML = `
			<div class="flex-1 overflow-y-auto no-scrollbar pb-20 fade-in">${content}</div>
			${nav}
		`;
	}

	// 渲染CRC端
	function renderCRC() {
		const screen = document.getElementById('crc-screen');

		if (!state.crc.isLoggedIn) {
			screen.innerHTML = renderLogin('crc');
			return;
		}

		let content = '';
		const showNav = !state.crc.selectedApptId && state.crc.view === 'list';
		const nav = showNav ? renderBottomNav('crc', state.crc.currentTab) : '';

		if (state.crc.view === 'switch_context') {
			content = renderSwitchContext('crc');
		} else if (state.crc.view === 'messages') {
			content = renderMessages('crc');
		} else if (state.crc.view === 'my_centers') {
			content = renderSimpleList('crc', '我的中心', state.centers.map(c => ({ title: c.name, sub: '关联时间: 2023-01-01' })));
		} else if (state.crc.view === 'my_projects') {
			content = renderSimpleList('crc', '我的项目', state.projects.map(p => ({ title: p.name, sub: p.status, badge: p.status })));
		} else if (state.crc.view === 'group_detail') {
			content = renderGroupDetail('crc');
		} else if (state.crc.view === 'form') { // 优先渲染表单
			content = renderCRCForm();
		} else if (state.crc.selectedApptId) { // 优先渲染详情
			content = renderCRCDetail();
		} else {
			if (state.crc.currentTab === 'home') {
				content = renderCRCHome();
			} else if (state.crc.currentTab === 'records') {
				content = renderRecords('crc');
			} else {
				content = renderProfile('crc', '张协调员');
			}
		}

		screen.innerHTML = `
			<div class="flex-1 overflow-y-auto no-scrollbar pb-20 fade-in">${content}</div>
			${nav}
		`;
	}

	// --- 3. 页面组件模版 (Components) ---
	// 登录页
	function renderLogin(role) {
		const isDoc = role === 'doc';
		const color = isDoc ? 'blue' : 'indigo';
		const icon = isDoc ? 'stethoscope' : 'clipboard-check';
		const title = isDoc ? '医生工作台' : 'CRC 工作台';
		
		return `
			<div class="flex flex-col items-center justify-center h-full p-8 bg-white">
					<div class="w-20 h-20 bg-${color}-100 rounded-2xl flex items-center justify-center text-${color}-600 mb-6">
							<i data-lucide="${icon}" width="40" height="40"></i>
					</div>
					<h2 class="text-2xl font-bold text-gray-900 mb-2">欢迎登录</h2>
					<p class="text-gray-500 mb-10">${title}</p>
					
					<div class="w-full space-y-4">
							<div>
									<label class="text-xs font-bold text-gray-600 ml-1">账号</label>
									<input type="text" value="${isDoc ? 'Dr.Li' : 'CRC.Zhang'}" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-${color}-500 transition-colors">
							</div>
							<div>
									<label class="text-xs font-bold text-gray-600 ml-1">密码</label>
									<input type="password" value="******" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-${color}-500 transition-colors">
							</div>
							<button onclick="actions.login('${role}')" class="w-full bg-${color}-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-${color}-700 active:scale-95 transition-all mt-4">
									立即登录
							</button>
					</div>
			</div>
		`;
	}

	// 底部导航
	function renderBottomNav(role, activeTab) {
		const color = role === 'doc' ? 'text-blue-600' : 'text-indigo-600';
		const base = 'text-gray-400';
		
		return `
				<div class="absolute bottom-0 left-0 w-full h-16 bg-white border-t border-gray-100 flex justify-around items-center z-10">
						<button onclick="actions.switchTab('${role}', 'home')" class="flex flex-col items-center gap-1 ${activeTab === 'home' ? color : base}">
								<i data-lucide="${role === 'doc' ? 'home' : 'layout-list'}" width="20"></i>
								<span class="text-[10px] font-medium">首页</span>
						</button>
						<button onclick="actions.switchTab('${role}', 'records')" class="flex flex-col items-center gap-1 ${activeTab === 'records' ? color : base}">
								<i data-lucide="clock" width="20"></i>
								<span class="text-[10px] font-medium">记录</span>
						</button>
						<button onclick="actions.switchTab('${role}', 'profile')" class="flex flex-col items-center gap-1 ${activeTab === 'profile' ? color : base}">
								<i data-lucide="user" width="20"></i>
								<span class="text-[10px] font-medium">我的</span>
						</button>
				</div>
		`;
	}

	// 状态徽章 helper
	function getStatusBadge(status) {
		const map = {
			'PENDING_INFO': { class: 'bg-yellow-100 text-yellow-700', text: '待补充资料' },
			'PENDING_CONFIRM': { class: 'bg-blue-100 text-blue-700', text: '待CRC确认' },
			'APPOINTED': { class: 'bg-green-100 text-green-700', text: '预约成功' },
			'CLOSED': { class: 'bg-gray-100 text-gray-500', text: '已关闭' },
			'ENROLLED': { class: 'bg-purple-100 text-purple-700', text: '已入组' }
		};
		const s = map[status] || map['CLOSED'];
		return `<span class="px-2 py-0.5 rounded text-[10px] font-bold ${s.class}">${s.text}</span>`;
	}

	// 渲染首页公共头部
	function renderHomeHeader(role) {
		const isDoc = role === 'doc';
		const color = isDoc ? 'blue' : 'indigo';
		const currentCenter = state.centers.find(c => c.id === state[role].centerId) || state.centers[0];
		const currentProject = state.projects.find(p => p.id === state[role].projectId) || state.projects[0];
		const unreadMsgs = state.messages.filter(m => !m.read).length;

		return `
			<div class="flex justify-between items-start mb-4">
					<div class="flex-1">
							<h2 class="text-lg font-bold text-gray-900 mb-1">${currentCenter.name}</h2>
							<div onclick="actions.openSwitchContext('${role}')" class="flex items-center gap-2 text-${color}-600 bg-${color}-50 px-3 py-1.5 rounded-lg w-fit cursor-pointer active:scale-95 transition-transform">
								<span class="text-xs font-bold truncate max-w-[160px]">${currentProject.name}</span>
								<i data-lucide="arrow-right-left" width="12"></i>
							</div>
					</div>
					<div onclick="actions.openMessages('${role}')" class="relative w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-gray-400 cursor-pointer hover:bg-gray-50 border border-gray-100">
							<i data-lucide="bell" width="18"></i>
							${unreadMsgs > 0 ? `<span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white"></span>` : ''}
					</div>
			</div>
		`;
	}

	// 渲染分组卡片
	function renderGroups(role) {
		const isDoc = role === 'doc';
		const color = isDoc ? 'blue' : 'indigo';
		const projectGroups = state.groups.filter(g => g.projectId === state[role].projectId);

		return `
			<div class="space-y-3 mb-6">
				<div class="flex justify-between items-end px-1">
					<h3 class="text-sm font-bold text-gray-900">项目分组概览</h3>
					<span class="text-[10px] text-gray-400">共 ${projectGroups.length} 个分组</span>
				</div>
				${projectGroups.map(g => {
					const remaining = g.target - g.enrolled;
					const progress = Math.round((g.enrolled / g.target) * 100);
					return `
						<div onclick="actions.openGroupDetail('${role}', '${g.id}')" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 active:scale-95 transition-transform cursor-pointer group">
							<div class="flex justify-between items-start mb-3">
								<div>
									<h4 class="font-bold text-gray-800 text-base">${g.name}</h4>
									<p class="text-xs text-gray-400 mt-1 flex items-center gap-1">
										<i data-lucide="pill" width="12"></i> ${g.drug}
									</p>
								</div>
								<i data-lucide="chevron-right" class="text-gray-300 group-hover:text-${color}-500 transition-colors" width="16"></i>
							</div>
							
							<div class="flex items-center gap-4 text-xs">
								<div class="flex-1">
									<div class="flex justify-between mb-1">
										<span class="text-gray-500">已入组</span>
										<span class="font-bold text-${color}-600">${g.enrolled}</span>
									</div>
									<div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
										<div class="h-full bg-${color}-500 rounded-full" style="width: ${progress}%"></div>
									</div>
								</div>
								<div class="flex-1 border-l border-gray-100 pl-4">
									<div class="flex justify-between mb-1">
										<span class="text-gray-500">剩余名额</span>
										<span class="font-bold text-gray-900">${remaining}</span>
									</div>
									<div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
										<div class="h-full bg-gray-300 rounded-full" style="width: ${100 - progress}%"></div>
									</div>
								</div>
							</div>
						</div>
					`;
				}).join('')}
			</div>
		`;
	}

	// 渲染受试者表格 (首页底部)
	function renderSubjectsTable(role) {
		const isDoc = role === 'doc';
		// 首页只显示该项目下的最近受试者
		const subjects = state.appointments.filter(a => a.projectId === state[role].projectId).slice(0, 5);

		return `
			<div>
				<h3 class="text-sm font-bold text-gray-900 mb-3 px-1">最新受试者动态</h3>
				<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
					<table class="w-full text-left text-xs">
						<thead class="bg-gray-50 text-gray-500 font-medium border-b border-gray-100">
							<tr>
								<th class="p-3 pl-4">姓名/状态</th>
								<th class="p-3">时间</th>
								<th class="p-3 pr-4 text-right">操作</th>
							</tr>
						</thead>
						<tbody class="divide-y divide-gray-50">
							${subjects.length === 0 ? '<tr><td colspan="3" class="p-4 text-center text-gray-400">暂无数据</td></tr>' : subjects.map(s => `
								<tr class="hover:bg-gray-50/50">
									<td class="p-3 pl-4">
										<div class="font-bold text-gray-800">${s.name}</div>
										${getStatusBadge(s.status)}
									</td>
									<td class="p-3 text-gray-400">${s.time}</td>
									<td class="p-3 pr-4 text-right">
										<button onclick="${isDoc ? 'actions.openDocForm()' : `actions.openCRCDetail('${s.id}')`}" class="text-blue-600 font-bold px-2 py-1 bg-blue-50 rounded hover:bg-blue-100 transition-colors">查看</button>
									</td>
								</tr>
							`).join('')}
						</tbody>
					</table>
					${subjects.length > 0 ? `
						<div onclick="actions.switchTab('${role}', 'records')" class="p-3 text-center text-xs text-gray-400 border-t border-gray-50 cursor-pointer hover:bg-gray-50 transition-colors">
							查看全部记录 <i data-lucide="arrow-right" class="inline w-3 h-3 align-middle"></i>
						</div>
					` : ''}
				</div>
			</div>
		`;
	}

	// --- 医生端组件 ---
	function renderDocHome() {
		return `
			<div class="p-5 pb-24">
				${renderHomeHeader('doc')}
				${renderGroups('doc')}
				${renderSubjectsTable('doc')}
			</div>
			
			<!-- 悬浮按钮 -->
			<button onclick="actions.openDocForm()" class="absolute bottom-20 right-5 bg-blue-600 text-white p-4 rounded-full shadow-xl hover:bg-blue-700 active:scale-90 transition-all flex items-center gap-2 pr-6 z-20">

	function renderGroupDetail(role) {
		const isDoc = role === 'doc';
		const color = isDoc ? 'blue' : 'indigo';
		const group = state.groups.find(g => g.id === state[role].selectedGroupId);
		
		if (!group) return '';

		const progress = Math.round((group.enrolled / group.target) * 100);

		return `
			<div class="flex flex-col h-full bg-gray-50">
				<div class="bg-white p-4 flex items-center gap-2 shadow-sm z-10">
					<button onclick="actions.closeGroupDetail('${role}')"><i data-lucide="arrow-left"></i></button>
					<span class="font-bold ml-2">分组详情</span>
				</div>
				
				<div class="p-5 space-y-5 overflow-y-auto">
					<!-- 顶部概览 -->
					<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 text-center">
						<h2 class="text-xl font-bold text-gray-900 mb-1">${group.name}</h2>
						<p class="text-sm text-gray-500 mb-4">${group.drug}</p>
						
						<div class="flex justify-center items-center gap-8 mb-4">
							<div>
								<div class="text-2xl font-bold text-${color}-600">${group.enrolled}</div>
								<div class="text-xs text-gray-400">已入组</div>
							</div>
							<div class="w-px h-8 bg-gray-100"></div>
							<div>
								<div class="text-2xl font-bold text-gray-900">${group.target}</div>
								<div class="text-xs text-gray-400">目标人数</div>
							</div>
						</div>
						
						<div class="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
							<div class="h-full bg-${color}-500 rounded-full" style="width: ${progress}%"></div>
						</div>
						<p class="text-xs text-gray-400 mt-2">总体进度 ${progress}%</p>
					</div>

					<!-- 维度分布 -->
					<div>
						<h3 class="text-sm font-bold text-gray-900 mb-3 px-1">因子维度分布</h3>
						<div class="space-y-3">
							${group.dimensions.map(dim => {
								const dimProgress = Math.round((dim.current / dim.target) * 100);
								const remaining = dim.target - dim.current;
								// 将长字符串拆分为标签
								const tags = dim.name.split('|').map(s => s.trim());
								
								return `
									<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
										<div class="mb-3">
											${tags.map(t => `<span class="inline-block bg-gray-100 text-gray-600 text-[10px] px-2 py-1 rounded mr-1 mb-1 font-medium">${t}</span>`).join('')}
										</div>
										<div class="flex items-center gap-3 text-xs">
											<div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
												<div class="h-full bg-${color}-500 rounded-full" style="width: ${dimProgress}%"></div>
											</div>
											<div class="text-right min-w-[60px]">
												<span class="text-gray-900 font-bold">${dim.current}</span>
												<span class="text-gray-400">/ ${dim.target}</span>
											</div>
										</div>
										<div class="mt-2 flex justify-between items-center">
											<span class="text-[10px] text-gray-400">当前进度 ${dimProgress}%</span>
											${remaining <= 5 ? `<span class="text-[10px] text-red-500 font-bold bg-red-50 px-2 py-0.5 rounded">仅剩 ${remaining} 名额</span>` : ''}
										</div>
									</div>
								`;
							}).join('')}
						</div>
					</div>
				</div>
			</div>
		`;
	}

				<div class="bg-white p-4 flex items-center gap-2 shadow-sm z-10">
					<button onclick="actions.closeSwitchContext('${role}')"><i data-lucide="arrow-left"></i></button>
					<span class="font-bold ml-2">切换项目</span>
				</div>
				
				<div class="p-5 space-y-6">
					<div>
						<label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">所属中心</label>
						<div class="relative">
							<select onchange="actions.selectCenter('${role}', this.value)" class="w-full p-3 pr-10 bg-white rounded-xl border border-gray-200 outline-none focus:border-blue-500 appearance-none font-bold text-gray-700">
								${state.centers.map(c => `
									<option value="${c.id}" ${c.id === currentCenterId ? 'selected' : ''}>${c.name}</option>
								`).join('')}
							</select>
							<i data-lucide="chevron-down" class="absolute right-3 top-3.5 text-gray-400 pointer-events-none" width="16"></i>
						</div>
					</div>

					<div>
						<label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">可选项目</label>
						<div class="space-y-3">
							${projects.map(p => `
								<div onclick="actions.selectProject('${role}', '${p.id}')" class="bg-white p-4 rounded-xl border-2 ${p.id === currentProjectId ? 'border-blue-500 bg-blue-50' : 'border-transparent'} shadow-sm flex justify-between items-center cursor-pointer hover:shadow-md transition-all">
									<div>
										<div class="font-bold text-gray-800">${p.name}</div>
										<div class="text-xs text-gray-400 mt-1">状态: ${p.status}</div>
									</div>
									${p.id === currentProjectId ? '<i data-lucide="check-circle" class="text-blue-600"></i>' : ''}
								</div>
							`).join('')}
						</div>
					</div>
				</div>
			</div>
		`;
	}

	// --- 消息列表页面 ---
	function renderMessages(role) {
		return `
			<div class="flex flex-col h-full bg-gray-50">
				<div class="bg-white p-4 flex items-center gap-2 shadow-sm z-10">
					<button onclick="actions.closeMessages('${role}')"><i data-lucide="arrow-left"></i></button>
					<span class="font-bold ml-2">消息通知</span>
				</div>
				<div class="p-4 space-y-3">
					${state.messages.map(m => `
						<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${m.read ? 'border-gray-200' : 'border-blue-500'}">
							<div class="flex justify-between items-start mb-1">
								<h3 class="font-bold text-sm text-gray-900 ${m.read ? 'opacity-60' : ''}">${m.title}</h3>
								<span class="text-xs text-gray-400">${m.time}</span>
							</div>
							<p class="text-xs text-gray-500 line-clamp-2">${m.content}</p>
						</div>
					`).join('')}
				</div>
			</div>
		`;
	}
	
	// --- 简单列表页面 (用于我的中心/我的项目) ---
	function renderSimpleList(role, title, items) {
		return `
			<div class="flex flex-col h-full bg-gray-50">
				<div class="bg-white p-4 flex items-center gap-2 shadow-sm z-10">
					<button onclick="actions.closeSimpleList('${role}')"><i data-lucide="arrow-left"></i></button>
					<span class="font-bold ml-2">${title}</span>
				</div>
				<div class="p-4 space-y-3">
					${items.map(item => `
						<div class="bg-white p-4 rounded-xl shadow-sm">
							<div class="flex justify-between items-center">
								<h3 class="font-bold text-sm text-gray-900">${item.title}</h3>
								${item.badge ? `<span class="px-2 py-0.5 bg-green-100 text-green-700 text-[10px] rounded font-bold">${item.badge}</span>` : ''}
							</div>
							${item.sub ? `<p class="text-xs text-gray-400 mt-1">${item.sub}</p>` : ''}
						</div>
					`).join('')}
				</div>
			</div>
		`;
	}

	// --- 4. 交互逻辑 (Actions) ---

	const actions = {
		login: (role) => {
			state[role].isLoggedIn = true;
			renderAll();
		},
		logout: (role) => {
			state[role].isLoggedIn = false;
			renderAll();
		},
		switchTab: (role, tab) => {
			state[role].currentTab = tab;
			state[role].view = 'list';
			// 重置子状态
			if (role === 'crc') state.crc.selectedApptId = null;
			renderAll();
		},
		switchRecordTab: (role, tab) => {
			state[role].recordTab = tab;
			renderAll();
		},
		setCRCFilter: (filter) => {
			state.crc.filter = filter;
			renderAll();
		},
		
		// 导航逻辑
		openSwitchContext: (role) => {
			state[role].view = 'switch_context';
			renderAll();
		},
		closeSwitchContext: (role) => {
			state[role].view = 'list';
			renderAll();
		},
		selectCenter: (role, centerId) => {
			state[role].centerId = centerId;
			const p = state.projects.find(p => p.centerId === centerId);
			if (p) state[role].projectId = p.id;
			renderAll();
		},
		selectProject: (role, projectId) => {
			state[role].projectId = projectId;
			state[role].view = 'list';
			renderAll();
		},
		
		openMessages: (role) => {
			state[role].view = 'messages';
			renderAll();
		},
		closeMessages: (role) => {
			state[role].view = 'list';
			renderAll();
		},
		
		openSimpleList: (role, type) => {
			state[role].view = type;
			renderAll();
		},
		closeSimpleList: (role) => {
			state[role].view = 'list';
			renderAll();
		},
		
		openGroupDetail: (role, groupId) => {
			state[role].selectedGroupId = groupId;
			state[role].view = 'group_detail';
			renderAll();
		},
		closeGroupDetail: (role) => {
			state[role].view = 'list';
			renderAll();
		},

		// 医生端操作
		openDocForm: () => {
			state.doc.formData = { name: '', phone: '', gender: '', age: '', diopter: '' };
			state.doc.view = 'form';
			renderAll();
		},
		closeDocForm: () => {
			state.doc.view = 'list';
			renderAll();
		},
		updateDocForm: (field, value) => {
			state.doc.formData[field] = value;
			renderAll();
		},
		submitDocForm: () => {
			const f = state.doc.formData;
			const isFull = f.name && f.phone && f.gender && f.age && f.diopter;
			
			const newApp = {
				id: Math.random().toString(36).substr(2, 9),
				name: f.name,
				phone: f.phone,
				gender: f.gender,
				age: f.age,
				diopter: f.diopter,
				status: isFull ? 'PENDING_CONFIRM' : 'PENDING_INFO',
				doctor: '李医生',
				time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
				projectId: state.doc.projectId
			};
			
			state.appointments.unshift(newApp);
			state.doc.view = 'list';
			renderAll();
			alert(isFull ? '名额锁定成功！等待CRC确认。' : '线索已提交！');
		},

		// CRC端操作
		openCRCDetail: (id) => {
			state.crc.selectedApptId = id;
			renderAll();
		},
		closeCRCDetail: () => {
			state.crc.selectedApptId = null;
				renderAll();
		},
		
		openCRCForm: () => {
			state.crc.formData = { name: '', phone: '', gender: '', age: '', diopter: '' };
			state.crc.view = 'form';
			renderAll();
		},
		closeCRCForm: () => {
			state.crc.view = 'list';
			renderAll();
		},
		updateCRCForm: (field, value) => {
			if (!state.crc.formData) state.crc.formData = {};
			state.crc.formData[field] = value;
			renderAll();
		},
		submitCRCForm: () => {
			const f = state.crc.formData;
			const newApp = {
				id: Math.random().toString(36).substr(2, 9),
				name: f.name,
				phone: f.phone,
				gender: f.gender,
				age: f.age,
				diopter: f.diopter,
				status: 'PENDING_CONFIRM', // CRC 录入直接进入待确认
				doctor: '自主录入',
				time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
				projectId: state.crc.projectId
			};
			
			state.appointments.unshift(newApp);
			state.crc.view = 'list';
			renderAll();
			alert('受试者录入成功！');
		},

		saveCRCInfo: (id) => {
			const gender = document.getElementById('crc-edit-gender').value;
			const age = document.getElementById('crc-edit-age').value;
			const diopter = document.getElementById('crc-edit-diopter').value;

			if (!gender || !age) {
					alert('请至少补全性别和年龄');
					return;
			}

			const app = state.appointments.find(a => a.id === id);
			app.gender = gender;
			app.age = age;
			app.diopter = diopter;
			app.status = 'PENDING_CONFIRM';
			
			renderAll();
		},
		confirmAppt: (id) => {
			const app = state.appointments.find(a => a.id === id);
				app.status = 'APPOINTED';
				renderAll();
		},
		rejectAppt: (id) => {
			const reason = prompt("请输入拒绝/关闭原因：", "电话空号");
			if (reason) {
				const app = state.appointments.find(a => a.id === id);
				app.status = 'CLOSED';
				state.crc.selectedApptId = null;
				renderAll();
			}
		},
		convertPatient: (id) => {
			const app = state.appointments.find(a => a.id === id);
			app.status = 'ENROLLED';
			
			// 简单模拟随机分配组别
			const groups = state.groups.filter(g => g.projectId === state.crc.projectId);
			if (groups.length > 0) {
				const randomGroup = groups[Math.floor(Math.random() * groups.length)];
				app.group = randomGroup.id;
				randomGroup.enrolled++; // 更新计数
			}
			
			alert(`跳转至随机化系统...\n自动回填数据：\n姓名：${app.name}\n电话：${app.phone}\n\n分配结果：${app.group ? state.groups.find(g=>g.id===app.group).name : '无'}`);
			state.crc.selectedApptId = null;
			renderAll();
		}
	};

	// 初始化
	renderAll();

	// 更新时间
	setInterval(() => {
		const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
		document.getElementById('doc-clock').innerText = time;
		document.getElementById('crc-clock').innerText = time;
	}, 1000);

</script>
</body>
</html>
