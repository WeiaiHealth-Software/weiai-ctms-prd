<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>中央随机化系统 - 双端交互演示</title>
	<link rel="icon" href="logo.svg" type="image/svg+xml">
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<style>
		/* 隐藏滚动条但保持滚动功能 */
		.no-scrollbar::-webkit-scrollbar {
				display: none;
		}
		.no-scrollbar {
				-ms-overflow-style: none;
				scrollbar-width: none;
		}
		
		/* 手机外壳模拟 */
		.phone-frame {
				width: 360px;
				height: 700px;
				border-radius: 30px;
				border: 12px solid #1f2937;
				overflow: hidden;
				position: relative;
				background-color: #f3f4f6;
				box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
		}
		
		.notch {
				position: absolute;
				top: 0;
				left: 50%;
				transform: translateX(-50%);
				width: 120px;
				height: 25px;
				background-color: #1f2937;
				border-bottom-left-radius: 12px;
				border-bottom-right-radius: 12px;
				z-index: 50;
		}

		.app-header {
				padding-top: 35px;
		}
		
		/* 动画效果 */
		.fade-in {
				animation: fadeIn 0.3s ease-in-out;
		}
		
		@keyframes fadeIn {
				from { opacity: 0; transform: translateY(10px); }
				to { opacity: 1; transform: translateY(0); }
		}
	</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center font-sans">
	<div class="mb-6 text-center">
		<h1 class="text-2xl font-bold text-gray-800">中央随机化系统交互原型</h1>

	</div>
	<div class="flex flex-wrap gap-10 justify-center items-center w-full max-w-full px-10">
		<!-- ================= 小程序首页：选择角色 ================= -->

			<div class="notch"></div>
			<div class="flex-1 overflow-y-auto no-scrollbar bg-white flex flex-col justify-center p-6 space-y-6">

					</div>
					<h1 class="text-2xl font-bold text-gray-900">惟翎·中央随机化系统</h1>

				<!-- 医生卡片 -->

				<!-- CRC卡片 -->
				<div onclick="alert('即将进入 CRC 端...')" class="bg-white p-4 rounded-xl shadow-md border border-gray-100 flex items-center gap-4 cursor-pointer hover:bg-gray-50 active:scale-95 transition-all group">
					<div class="w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
						<i data-lucide="clipboard-check" class="w-7 h-7"></i>
					</div>
					<div class="flex-1">

				<!-- 厂家卡片 -->

						<i data-lucide="building-2" class="w-7 h-7"></i>
					</div>
					<div class="flex-1">
						<h3 class="font-bold text-gray-800 text-lg">我是厂家</h3>
						<p class="text-xs text-gray-400">Sponsor / Manager</p>
					</div>
					<i data-lucide="chevron-right" class="text-gray-300 group-hover:text-purple-500 transition-colors"></i>
				</div>
			</div>
		</div>

		<!-- ================= 医生端手机 ================= -->
		<!-- ================= 医生端手机 ================= -->
		<div class="phone-frame flex flex-col">
			<div class="notch"></div>	

			<!-- 医生端 Content -->
			<div id="doctor-view" class="flex-1 overflow-y-auto no-scrollbar relative bg-gray-50">
				<!-- 动态内容渲染区域 -->

			<!-- 医生端 Tabbar -->
			<div id="doc-tabbar" class="bg-white border-t p-3 flex justify-around text-xs text-gray-500 hidden">

		</div>
		<!-- ================= CRC端手机 ================= -->
		<div class="phone-frame flex flex-col">
				<div class="notch"></div>
				<!-- CRC端 Content -->
				<div id="crc-view" class="flex-1 overflow-y-auto no-scrollbar bg-gray-50">
						<!-- 动态内容渲染区域 -->
				</div>
				<!-- CRC端 Tabbar -->
				<div id="crc-tabbar" class="bg-white border-t p-3 flex justify-around text-xs text-gray-500 hidden">
					<div id="crc-tab-home" class="tab-item flex flex-col items-center text-emerald-600 cursor-pointer" onclick="app.switchTab('crc', 'home')">
						<i data-lucide="layout-list" class="w-6 h-6 mb-1"></i>
						工作台
					</div>
					<div id="crc-tab-profile" class="tab-item flex flex-col items-center cursor-pointer" onclick="app.switchTab('crc', 'profile')">
						<i data-lucide="user" class="w-6 h-6 mb-1"></i>
						我的
					</div>
				</div>
		</div>
		<!-- ================= 厂家端手机 ================= -->
		<div class="phone-frame flex flex-col">
				<div class="notch"></div>
				<!-- 厂家端 Content -->
				<div id="mfr-view" class="flex-1 overflow-y-auto no-scrollbar bg-gray-50">
						<!-- 动态内容渲染区域 -->
				</div>
				<!-- 厂家端 Tabbar -->
				<div id="mfr-tabbar" class="bg-white border-t p-3 flex justify-around text-xs text-gray-500 hidden">
					<div id="mfr-tab-home" class="tab-item flex flex-col items-center text-purple-600 cursor-pointer" onclick="app.switchTab('mfr', 'home')">
						<i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
						工作台
					</div>
					<div id="mfr-tab-profile" class="tab-item flex flex-col items-center cursor-pointer" onclick="app.switchTab('mfr', 'profile')">
						<i data-lucide="user" class="w-6 h-6 mb-1"></i>
						我的
					</div>
				</div>
		</div>
	</div>
<!-- 模拟数据库和逻辑 -->
<script>
		// ================= 模拟数据存储 =================

					{ id: '103', name: '李强', phone: '13766668888', sex: '男', age: '4~7岁', diopter: '-1.50~0.00D', status: 'enrolled', doctor: '李医生', time: '昨天', group: 'g1', s_no: 'S-003', id_no: 'ID-A01', r_no: 'R-X92', drug_no: 'D-K31' },
					{ id: '104', name: '赵敏', phone: '13999990000', sex: '女', age: '8~10岁', diopter: '0.01D~1.50D', status: 'enrolled', doctor: '李医生', time: '昨天', group: 'g2', s_no: 'S-004', id_no: 'ID-B05', r_no: 'R-Y88', drug_no: 'D-M55' },
					{ id: '105', name: '刘洋', phone: '13611112222', sex: '男', age: '11~14岁', diopter: '0.01D~1.50D', status: 'pending_confirm', doctor: '李医生', time: '前天', group: '', s_no: 'S-005', id_no: '', r_no: '', drug_no: '' },
					{ id: '106', name: '陈晨', phone: '13533334444', sex: '女', age: '4~7岁', diopter: '-1.50~0.00D', status: 'enrolled', doctor: '李医生', time: '前天', group: 'g1', s_no: 'S-006', id_no: 'ID-C09', r_no: 'R-Z11', drug_no: 'D-P77' },
					{ id: '107', name: '杨光', phone: '13888889999', sex: '男', age: '8~10岁', diopter: '0.01D~1.50D', status: 'closed', doctor: '李医生', time: '3天前', group: '', s_no: 'S-007', id_no: '', r_no: '', drug_no: '' },
					{ id: '108', name: '周杰', phone: '13900001111', sex: '男', age: '11~14岁', diopter: '-1.50~0.00D', status: 'enrolled', doctor: '李医生', time: '4天前', group: 'g2', s_no: 'S-008', id_no: 'ID-D12', r_no: 'R-Q33', drug_no: 'D-L99' },
					{ id: '109', name: '吴艳', phone: '13722223333', sex: '女', age: '4~7岁', diopter: '0.01D~1.50D', status: 'pending_info', doctor: '李医生', time: '5天前', group: '', s_no: 'S-009', id_no: '', r_no: '', drug_no: '' },
					{ id: '110', name: '郑华', phone: '13655556666', sex: '男', age: '8~10岁', diopter: '-1.50~0.00D', status: 'enrolled', doctor: '李医生', time: '一周前', group: 'g1', s_no: 'S-010', id_no: 'ID-E45', r_no: 'R-W66', drug_no: 'D-N22' }
				], // 预约记录
				notifications: [], // 医生收到的通知
				users: {
						doc: { isLoggedIn: false, name: '李医生', role: 'doc' },
						crc: { isLoggedIn: false, name: '王CRC', role: 'crc' },
						mfr: { isLoggedIn: false, name: '张经理', role: 'mfr' }
				}
		};

		// ================= 工具函数 =================
		const utils = {
				generateId: () => Math.random().toString(36).substr(2, 9),
				formatTime: () => new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}),
				
				// 检查维度是否齐全
				isDimensionsComplete: (data) => {
						return data.sex && data.age && data.diopter;
				},

				getStatusBadge: (status) => {
					const map = {
						'pending_info': { class: 'bg-yellow-100 text-yellow-700', text: '待补充资料' },
						'pending_confirm': { class: 'bg-blue-100 text-blue-700', text: '待CRC确认' },
						'confirmed': { class: 'bg-green-100 text-green-700', text: '预约成功' },
						'closed': { class: 'bg-gray-100 text-gray-500', text: '已关闭' },
						'enrolled': { class: 'bg-purple-100 text-purple-700', text: '已入组' }
					};
					const s = map[status] || map['closed'];
					return `<span class="px-2 py-0.5 rounded text-[10px] font-bold ${s.class}">${s.text}</span>`;
				}
		};

		// ================= 应用逻辑 =================
		const app = {
				state: {
						doc: { currentTab: 'home' },
						crc: { currentTab: 'home' },
						mfr: { currentTab: 'home' }
				},

				init: () => {
						// 默认显示登录页
						app.renderLogin('doc');
						app.renderLogin('crc');
						app.renderLogin('mfr');
						lucide.createIcons();
				},

				// 辅助渲染函数，自动刷新图标
				render: (viewId, html) => {
						document.getElementById(viewId).innerHTML = html;
						lucide.createIcons();
				},

				// 通用登录渲染
				renderLogin: (role) => {
					let viewId, color, icon, title, defaultUser;
					if (role === 'doc') {
						viewId = 'doctor-view'; color = 'blue'; icon = 'stethoscope'; title = '医生工作台'; defaultUser = 'Dr.Li';
					} else if (role === 'crc') {
						viewId = 'crc-view'; color = 'emerald'; icon = 'clipboard-check'; title = 'CRC 工作台'; defaultUser = 'CRC.Wang';
					} else {
						viewId = 'mfr-view'; color = 'purple'; icon = 'building-2'; title = '厂家工作台'; defaultUser = 'Mfr.Zhang';
					}
					
					const html = `
						<div class="flex flex-col items-center justify-center h-full p-8 bg-white fade-in">
							<div class="w-20 h-20 bg-${color}-100 rounded-2xl flex items-center justify-center text-${color}-600 mb-6">
								<i data-lucide="${icon}" width="40" height="40"></i>
							</div>
							<h2 class="text-2xl font-bold text-gray-900 mb-2">欢迎登录</h2>
							<p class="text-gray-500 mb-10">${title}</p>
							
							<div class="w-full space-y-4">
								<div>
									<label class="text-xs font-bold text-gray-600 ml-1">账号</label>
									<input type="text" value="${defaultUser}" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-${color}-500 transition-colors">
								</div>
								<div>
									<label class="text-xs font-bold text-gray-600 ml-1">密码</label>
									<input type="password" value="******" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-${color}-500 transition-colors">
								</div>
								<button onclick="app.login('${role}')" class="w-full bg-${color}-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-${color}-700 active:scale-95 transition-all mt-4">
									立即登录
								</button>
							</div>
						</div>
					`;
					
					app.render(viewId, html);
					// 隐藏 Tabbar
					app.toggleTabbar(role, false);
				},

				login: (role) => {
					DB.users[role].isLoggedIn = true;
					app.toggleTabbar(role, true);
					app.switchTab(role, 'home');
				},
				
				logout: (role) => {
					DB.users[role].isLoggedIn = false;
					app.renderLogin(role);
				},

				toggleTabbar: (role, show) => {
					let tabbarId;
					if (role === 'doc') tabbarId = 'doc-tabbar';
					else if (role === 'crc') tabbarId = 'crc-tabbar';
					else tabbarId = 'mfr-tabbar';

					const tabbar = document.getElementById(tabbarId);
					if (tabbar) {
						if (show) tabbar.classList.remove('hidden');
						else tabbar.classList.add('hidden');
					}
				},

				switchTab: (role, tab) => {
					app.state[role].currentTab = tab;
					app.updateTabStyles(role);
					
					if (tab === 'home') {
						if (role === 'doc') app.doctor.renderHome();
						else if (role === 'crc') app.crc.renderHome();
						else app.mfr.renderHome();
					} else if (tab === 'profile') {
						app.renderProfile(role);
					}
				},
				
				updateTabStyles: (role) => {
					const currentTab = app.state[role].currentTab;
					let color, prefix;
					if (role === 'doc') { color = 'text-blue-600'; prefix = 'doc'; }
					else if (role === 'crc') { color = 'text-emerald-600'; prefix = 'crc'; }
					else { color = 'text-purple-600'; prefix = 'mfr'; }
					
					// Reset all
					document.querySelectorAll(`#${prefix}-tabbar .tab-item`).forEach(el => {
						// 保留基本类，移除颜色类
						el.classList.remove('text-blue-600', 'text-emerald-600', 'text-purple-600');
						el.classList.add('text-gray-400');
					});
					
					// Set active
					const activeTab = document.getElementById(`${prefix}-tab-${currentTab}`);
					if (activeTab) {
						activeTab.classList.remove('text-gray-400');
						activeTab.classList.add(color);
					}
				},

				// 通用个人中心渲染 (复用 miniprogram.html 的设计)
				renderProfile: (role) => {
					let viewId, color, roleName;
					const user = DB.users[role];
					
					if (role === 'doc') {
						viewId = 'doctor-view'; color = 'blue'; roleName = '临床医生';
					} else if (role === 'crc') {
						viewId = 'crc-view'; color = 'emerald'; roleName = 'CRC 协调员';
					} else {
						viewId = 'mfr-view'; color = 'purple'; roleName = '项目经理';
					}
					
					const html = `
						<div class="mt-10 p-4 space-y-4 fade-in h-full flex flex-col">
							<div class="bg-white p-6 rounded-2xl shadow-sm flex items-center gap-4">
								<div class="w-16 h-16 rounded-full bg-${color}-100 text-${color}-600 flex items-center justify-center text-2xl font-bold">
									${user.name[0]}
								</div>
								<div>
									<h2 class="text-xl font-bold text-gray-900">${user.name}</h2>
									<p class="text-gray-500 text-sm">${roleName}</p>
								</div>
							</div>
							
							<div class="bg-white rounded-2xl shadow-sm overflow-hidden">
								<div onclick="app.renderMyCenters('${role}')" class="p-4 border-b border-gray-100 flex justify-between items-center cursor-pointer hover:bg-gray-50">
									<div class="flex items-center gap-3">
										<div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500"><i data-lucide="building-2" width="16"></i></div>
										<span class="font-bold text-gray-700 text-sm">我的中心</span>
									</div>
									<i data-lucide="chevron-right" class="text-gray-400" width="16"></i>
								</div>
								<div onclick="app.renderMyProjects('${role}')" class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50">
									<div class="flex items-center gap-3">
										<div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500"><i data-lucide="folder-kanban" width="16"></i></div>
										<span class="font-bold text-gray-700 text-sm">我的项目</span>
									</div>
									<i data-lucide="chevron-right" class="text-gray-400" width="16"></i>
								</div>

					submitAppointment: () => {
						const form = document.getElementById('appointForm');
						const formData = new FormData(form);
						const data = {
							id: utils.generateId(),
							name: formData.get('name'),
							phone: formData.get('phone'),
							sex: formData.get('sex'),
							age: formData.get('age'),
							diopter: formData.get('diopter'),
							doctor: "李医生",
							time: utils.formatTime(),
							status: 'pending' // pending_confirm (全) or pending_info (缺)
						};

						// 逻辑判断
						if (utils.isDimensionsComplete(data)) {
							data.status = 'pending_confirm';
							data.statusText = '待CRC确认';
							data.msg = '维度齐全，已锁定名额，等待CRC确认。';
						} else {
							data.status = 'pending_info';
							data.statusText = '待补充信息';
							data.msg = '维度缺失，已通知CRC联系患者补充。';
						}
						
						// 初始化字段
						data.group = '';
						data.s_no = '';
						data.id_no = '';
						data.r_no = '';
						data.drug_no = '';

						DB.appointments.unshift(data);
						
						// 模拟提交成功
						alert(`提交成功！\n状态：${data.statusText}\n${data.msg}`);
						app.doctor.renderHome();
						
						// 触发CRC端更新
						DB.notifications.unshift({
							title: '新预约申请',
							content: `李医生提交了患者 ${data.name} 的预约申请，请及时处理。`,
							time: utils.formatTime(),
							type: 'info'
						});
						
						app.crc.refreshBadge();
						app.crc.renderHome();
					},

					showNotifications: () => {
						const listHtml = DB.notifications.length === 0 
							? `<div class="text-center text-gray-400 mt-10">暂无消息</div>`
							: DB.notifications.map(n => `

						</div>
						<style>
							.animate-scale-up { animation: scaleUp 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
							@keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
						</style>
					`;
					
					const container = document.getElementById('crc-modal-container');
					if (container) {
						container.innerHTML = modalHtml;
						document.getElementById('modal-confirm-btn').onclick = () => {
							onConfirm();
							container.innerHTML = '';
						};
					}
				},

				confirmTask: (id) => {
						// 获取CRC修改后的数据
						const sex = document.getElementById('crc-sex').value;
						const age = document.getElementById('crc-age').value;
						const diopter = document.getElementById('crc-diopter').value;

						if (!sex || !age || !diopter) {
								alert("请先补全所有维度信息才能确认预约！");
								return;
						}

						app.crc.showModal(
							'确认预约 & 锁定名额',
							`
								<p>该操作表示患者已通过初筛，系统将为其<span class="font-bold text-emerald-600">预留名额</span>。</p>
								<ul class="list-disc pl-4 mt-2 text-gray-500 text-xs">
									<li>生成唯一的<span class="font-bold">筛选号</span></li>
									<li>状态变更为"预约成功"</li>
									<li><span class="text-orange-500">注意：尚未分配具体组别和产品</span></li>
								</ul>
							`,
							() => {
								// 更新数据
								const taskIndex = DB.appointments.findIndex(a => a.id === id);
								if(taskIndex > -1) {
										const task = DB.appointments[taskIndex];
										// 模拟生成各种编号
										const s_no = 'S-' + Math.random().toString(36).substr(2, 5).toUpperCase(); // 筛选号
										
										task.status = 'confirmed';
										task.sex = sex;
										task.age = age;
										task.diopter = diopter;
										task.s_no = s_no;
										
										// 通知医生
										DB.notifications.unshift({
												title: '预约确认成功',
												content: `患者 ${task.name} 的预约已被CRC确认。筛选号：${s_no}。`,
												time: utils.formatTime(),
												type: 'success'
										});
										
										alert(`已确认预约！\n筛选号：${s_no}\n医生将收到通知。`);
										app.crc.renderHome();
										app.doctor.refreshBadge(); // 医生端亮红点
								}
							}
						);
				},
				
				oneClickEnroll: (id) => {
					// 获取CRC修改后的数据（虽然是一键，但也需要表单数据）
					const sex = document.getElementById('crc-sex').value;
					const age = document.getElementById('crc-age').value;
					const diopter = document.getElementById('crc-diopter').value;
					
					if (!sex || !age || !diopter) {
						alert("请先补全所有维度信息才能转入组！");
						return;
					}

					app.crc.showModal(
						'一键转入组 (正式入组)',
						`
							<p>该操作表示患者正式进入临床试验，系统将立即执行<span class="font-bold text-emerald-600">随机化分组</span>。</p>
							<ul class="list-disc pl-4 mt-2 text-gray-500 text-xs">
								<li>生成<span class="font-bold">筛选号、受试者编号、随机号</span></li>
								<li>自动分配<span class="font-bold">产品号</span></li>
								<li>更新项目入组进度</li>
								<li><span class="text-red-500">此操作不可撤销</span></li>
							</ul>
						`,
						() => {
							const taskIndex = DB.appointments.findIndex(a => a.id === id);
							if (taskIndex > -1) {
								const task = DB.appointments[taskIndex];
								
								// 随机分配组别
								const group = Math.random() > 0.5 ? DB.groups[0] : DB.groups[1];
								
								// 生成编号
								const s_no = 'S-' + Math.random().toString(36).substr(2, 5).toUpperCase();
								const id_no = 'ID-' + Math.random().toString(36).substr(2, 5).toUpperCase();
								const r_no = 'R-' + Math.random().toString(36).substr(2, 5).toUpperCase();
								const drug_no = 'D-' + Math.random().toString(36).substr(2, 5).toUpperCase();
								
								task.status = 'enrolled';
								task.sex = sex;
								task.age = age;
								task.diopter = diopter;
								task.group = group.id;
								task.s_no = s_no;
								task.id_no = id_no;
								task.r_no = r_no;
								task.drug_no = drug_no;
								
								// 更新分组统计
								group.enrolled++;
								
								// 通知医生
								DB.notifications.unshift({
									title: '患者成功入组',
									content: `患者 ${task.name} 已成功入组 ${group.name}。\n筛选号:${s_no}\n受试者编号:${id_no}\n随机号:${r_no}\n产品号:${drug_no}`,
									time: utils.formatTime(),
									type: 'success'
								});
								
								alert(`入组成功！\n分配组别：${group.name}\n筛选号：${s_no}\n受试者编号：${id_no}\n随机号：${r_no}\n产品号：${drug_no}`);
								app.crc.renderHome();
								app.doctor.refreshBadge();
							}
						}
					);
				}
				},
				
				// --- 厂家端逻辑 ---
				mfr: {
					renderHome: () => {
						// Filter only ongoing projects
						const ongoingProjects = [
							{ id: 1, name: '青少年近视防控临床研究', code: 'MYOPIA-2024-001', status: 'ongoing', enrolled: 42, target: 150 },
							{ id: 3, name: '视网膜病变筛查研究', code: 'RETINA-2024-012', status: 'ongoing', enrolled: 5, target: 100 }
						];

						const html = `
							<div class="app-header bg-white text-black px-4 pb-6 shadow-xs flex justify-between items-center">
								<div>
									<div class="text-md opacity-80">Hi,</div>
									<div class="flex items-center gap-1 text-lg">
										张经理
										<span class="text-xs text-purple-600 bg-purple-50 px-2 py-0.5 rounded-md">Sponsor</span>
									</div>
								</div>
								<div class="relative p-2 bg-white shadow-md rounded-md">
									<i data-lucide="bell" class="w-5 h-5 text-gray-600"></i>
								</div>
							</div>
							<div class="p-4 fade-in">
								<h3 class="font-bold text-gray-700 mb-3 px-1">进行中的项目</h3>
								<div class="space-y-4">
									${ongoingProjects.map(p => {
										const progress = Math.round((p.enrolled / p.target) * 100);
										return `
											<div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
												<div class="flex justify-between items-start mb-4">
													<div>
														<h4 class="font-bold text-gray-800 text-base mb-1">${p.name}</h4>
														<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded">${p.code}</span>
													</div>
													<span class="text-xs px-2 py-0.5 rounded bg-blue-50 text-blue-600">进行中</span>
												</div>
												
												<div class="mb-2">
													<div class="flex justify-between text-xs text-gray-500 mb-1">
														<span>总体进度</span>
														<span class="font-bold text-gray-700">${progress}%</span>
													</div>
													<div class="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
														<div class="h-full bg-purple-500 rounded-full" style="width: ${progress}%"></div>
													</div>
												</div>
												<div class="flex justify-between text-xs text-gray-400 mt-2">
													<span>已入组: <span class="text-gray-700 font-medium">${p.enrolled}</span></span>
													<span>目标: <span class="text-gray-700 font-medium">${p.target}</span></span>
												</div>
											</div>
										`;
									}).join('')}
								</div>
							</div>
						`;
						app.render('mfr-view', html);
					}
				}
		};

		// 启动应用
		app.init();
</script>
</body>
</html>
