    <script>
        // ================= 数据模拟与结构定义 =================
        const projects = [
            { id: 'P001', code: 'XW09', name: '光刻微结构近视管理镜片在儿童青少年近视防控中的有效性及佩戴安全舒适性的随机对照临床研究', desc: '本研究旨在评估新型光刻微结构镜片在延缓儿童青少年近视进展方面的有效性与安全性。', pi: '徐蔚', centers: ['上海眼病防治中心'], organizations: ['南通诺瞳奕目医疗科技有限公司'], status: '进行中', statusColor: 'bg-green-100 text-green-800' },
            { id: 'P002', code: 'XW07', name: '某新型角膜塑形镜多中心随机对照临床试验', desc: '评估夜戴型角膜塑形镜对低中度近视患者的视力矫正效果及角膜安全性。', pi: '李教授', centers: ['上海眼病防治中心', '广东中山医院'], status: '已结束', organizations: ['南通诺瞳奕目医疗科技有限公司'], statusColor: 'bg-gray-100 text-gray-600' },
            { id: 'P003', code: 'XW06', name: '低浓度阿托品滴眼液联合光学干预的真实世界研究', desc: '观察0.01%阿托品滴眼液联合离焦眼镜在临床真实环境下的长期控制效果。', pi: '王主任', centers: ['上海眼病防治中心'], status: '准备中', organizations: ['南通诺瞳奕目医疗科技有限公司'], statusColor: 'bg-amber-100 text-amber-800' }
        ];

        const subjectsData = {};
        projects.forEach(p => {
            subjectsData[p.id] = Array.from({length: 10}, (_, i) => {
                const num = String(i + 1).padStart(3, '0');
                const isDropOut = i === 8;
                const enrollmentStatus = isDropOut ? '提前退出' : (i < 2 ? '筛选中' : '入组');
                const stage = isDropOut ? '-' : (i < 2 ? '-' : (['基线','3M','6M'][(i - 2) % 3]));
                const enrollmentStatusColor = enrollmentStatus === '提前退出' ? 'text-red-700 bg-red-50' : (enrollmentStatus === '筛选中' ? 'text-amber-700 bg-amber-50' : 'text-green-700 bg-green-50');
                const center = '上海市眼病防治中心';
                const department = '眼科';
                const endDate = isDropOut || p.status === '已结束' ? `2026-01-${String((i%20)+1).padStart(2,'0')}` : '';
                return {
                    id: `S-${p.id}-${num}`,
                    randomId: i < 2 ? '-' : `R${num}`,
                    initials: ['ZSM', 'LJH', 'WXY', 'CQ', 'ZJY'][i % 5],
                    enrollDate: `2025-10-${String((i%20)+1).padStart(2,'0')}`,
                    enrollmentStatus,
                    enrollmentStatusColor,
                    stage,
                    source: ['门诊','招募'][i % 2],
                    center,
                    department,
                    endDate
                };
            });
        });

        const visits = [
            { id: 'v0', name: 'V0 基线期 (0M)' },

            if (stage === '基线') return 'text-blue-700 bg-blue-50';
            if (stage === '3M') return 'text-amber-700 bg-amber-50';

            return 'text-gray-600 bg-gray-100';

            if (source === '门诊') return 'text-cyan-700 bg-cyan-50';

            return 'text-gray-700 bg-gray-100';

        function updateSortIndicators() {
            const lbl = document.getElementById('sort-id-label');
            const ind = document.getElementById('sort-id-indicator');
            if (lbl && ind) {
                if (subjectSortField === 'id') {
                    ind.textContent = subjectSortDir === 'asc' ? '↑' : '↓';
                    ind.className = 'text-blue-700';
                } else {
                    ind.textContent = '↕';
                    ind.className = 'text-gray-300';
                }
            }
        }

        function updateSubjectTable() {
            if (!currentProject) return;
            let list = subjectsData[currentProject.id].slice();
            if (subjectFilterCenter !== 'all') {
                list = list.filter(s => s.center === subjectFilterCenter);
            }
            if (subjectFilterSource !== 'all') {
                list = list.filter(s => s.source === subjectFilterSource);
            }
            if (subjectSearchQuery) {
                list = list.filter(s => s.id.includes(subjectSearchQuery));
            }
            list.sort((a, b) => {
                if (subjectSortField === 'enrollDate') {
                    const da = new Date(a.enrollDate).getTime();
                    const db = new Date(b.enrollDate).getTime();
                    return subjectSortDir === 'asc' ? da - db : db - da;
                } else if (subjectSortField === 'id') {
                    return subjectSortDir === 'asc' ? a.id.localeCompare(b.id) : b.id.localeCompare(a.id);
                }
                return 0;
            });
            const tbody = document.getElementById('subject-table-body');
            tbody.innerHTML = list.map(s => {
                const isDropout = s.enrollmentStatus === '提前退出';
                const rowClass = isDropout ? "bg-gray-50 text-gray-400" : "hover:bg-blue-50/50 transition-colors text-gray-900 group";
                const textClass = isDropout ? "line-through decoration-gray-400" : "";
                
                return `
                <tr class="${rowClass} border-b border-gray-100 last:border-0">
                    <td class="px-6 py-4 font-medium ${textClass}">${s.id}</td>
                    <td class="px-6 py-4 ${isDropout ? 'text-gray-400' : 'text-gray-600'} ${textClass}">${s.randomId}</td>
                    <td class="px-6 py-4 ${isDropout ? 'text-gray-400' : 'text-gray-600'} ${textClass}">${s.initials}</td>
                    <td class="px-6 py-4 ${textClass}">
                        <span class="px-2 py-1 rounded text-xs font-medium ${isDropout ? 'bg-gray-100 text-gray-400 border border-gray-200' : getSourceClass(s.source)}">${s.source || '-'}</span>
                    </td>
                    <td class="px-6 py-4 ${isDropout ? 'text-gray-400' : 'text-gray-600'} ${textClass}">${s.center || '-'}</td>
                    <td class="px-6 py-4 ${isDropout ? 'text-gray-400' : 'text-gray-600'} ${textClass}">${s.department || '-'}</td>
                    <td class="px-6 py-4">
                        ${
                            isDropout 
                            ? `<span class="px-2 py-1 rounded text-xs font-medium bg-red-50 text-red-600 border border-red-100">提前退出</span>`
                            : `<span class="px-2 py-1 rounded text-xs font-medium ${s.enrollmentStatusColor}">${s.enrollmentStatus}</span>
                               ${s.stage && s.stage !== '-' ? `<span class="ml-2 px-2 py-1 rounded text-xs font-medium ${getStageClass(s.stage)}">${s.stage}</span>` : ''}`
                        }
                    </td>
                    <td class="px-6 py-4 ${isDropout ? 'text-gray-400' : 'text-gray-600'} ${textClass}">${s.enrollDate}</td>
                    <td class="px-6 py-4 ${isDropout ? 'text-gray-400' : 'text-gray-600'} ${textClass}">${s.endDate || '--'}</td>
                    <td class="px-6 py-4 text-right space-x-3">
                        <button onclick="openSubject('${s.id}')" class="text-blue-600 hover:text-blue-800">查看详情</button>
                        <button class="${isDropout ? 'text-gray-300 cursor-not-allowed' : 'text-red-600 hover:text-red-800'}" ${isDropout ? 'disabled' : ''}>退出</button>
                    </td>
                </tr>
            `}).join('');
            updateSortIndicators();
        }

        function loadVisit(visitId) {
            currentVisit = visitId;
            const nav = document.getElementById('visit-nav');
            const currentIndex = visits.findIndex(v => v.id === currentVisit);

            nav.innerHTML = `<div class="relative px-2 py-2">` + 
                visits.map((v, index) => {
                    const isActive = v.id === currentVisit;
                    const isCompleted = index < currentIndex;
                    const isLast = index === visits.length - 1;
                    
                    let circleHtml = '';
                    let textClass = '';
                    let lineClass = isCompleted ? 'bg-blue-500' : 'bg-gray-200';
                    
                    if (isActive) {
                        circleHtml = `<div class="w-5 h-5 rounded-full bg-white border-2 border-blue-600 flex items-center justify-center shadow-sm">
                                        <div class="w-2 h-2 bg-blue-600 rounded-full"></div>
                                      </div>`;
                        textClass = 'text-blue-700 font-bold';
                    } else if (isCompleted) {
                        circleHtml = `<div class="w-5 h-5 rounded-full bg-blue-500 flex items-center justify-center shadow-sm">
                                        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                      </div>`;
                        textClass = 'text-gray-700 font-medium group-hover:text-blue-600';
                    } else {
                        circleHtml = `<div class="w-5 h-5 rounded-full bg-white border-2 border-gray-300 group-hover:border-blue-400 transition-colors"></div>`;
                        textClass = 'text-gray-500 group-hover:text-gray-800 font-medium';
                    }

                    return `
                        <div onclick="loadVisit('${v.id}')" class="relative flex items-start group cursor-pointer ${isLast ? '' : 'pb-8'}">
                            ${!isLast ? `<div class="absolute left-[9px] top-5 bottom-0 w-[2px] ${lineClass} transition-colors"></div>` : ''}
                            <div class="flex items-center justify-center shrink-0 relative z-10 bg-white">
                                ${circleHtml}
                            </div>
                            <div class="ml-3 flex-1 flex flex-col justify-center min-h-[20px]">
                                <span class="${textClass} text-sm transition-colors block">${v.name}</span>
                            </div>
                        </div>
                    `;
                }).join('') +
            `</div>`;
            
            const visitName = visits.find(v => v.id === visitId).name;
            document.getElementById('current-visit-title').innerText = `${visitName} 数据采集表`;
            
            renderActions();
            renderForm();
        }

        // ================= 高级表单引擎 =================
        function toggleEditMode() {
            if(isEditMode) {
                // 保存数据：从 DOM 抓取基础字段
                document.querySelectorAll('#dynamic-form input, #dynamic-form select').forEach(el => {
                    if(el.name && !el.name.includes('_list_')) {
                        if(el.type === 'radio') { if(el.checked) formData[el.name] = el.value; }
                        else formData[el.name] = el.value;
                    }
                });
            }
            isEditMode = !isEditMode;
            renderActions();
            renderForm();
        }

        function renderActions() {
            const container = document.getElementById('form-actions');
            const badge = document.getElementById('edit-status-badge');
            if (isEditMode) {
                badge.innerText = "编辑模式"; badge.className = "text-xs px-2 py-1 rounded bg-amber-100 text-amber-700 font-medium border border-amber-200";
                container.innerHTML = `
                    <button onclick="toggleEditMode()" class="text-sm bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-50 transition font-medium">取消</button>
                    <button onclick="toggleEditMode()" class="text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md shadow-sm transition font-medium">保存数据</button>
                `;
            } else {
                badge.innerText = "只读模式"; badge.className = "text-xs px-2 py-1 rounded bg-gray-100 text-gray-600";
                container.innerHTML = `
                    <button onclick="alert('CRA功能，二期开发')" class="text-sm bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-50 transition font-medium">提出质疑 (Query)</button>

                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>

        function renderForm() {
            const container = document.getElementById('dynamic-form');
            let schemaToRender = [];

            if (currentVisit === 'v0') {
                schemaToRender = formSchema;
            } else if (['v1', 'v2', 'v3', 'v4'].includes(currentVisit)) {
                schemaToRender = followUpSchema;
            } else {
                container.innerHTML = `<div class="text-gray-400 text-center py-16">该访视节点暂无表单配置</div>`;
                renderTOC([]); 
                return;
            }

            let html = '';
            // 记录信息 (Meta Card)
            const invOpts = Array.from(new Set([currentProject?.pi, "张主任","李教授","王主任"].filter(Boolean)));
            const examinerOpts = ["姚文波", "张骏婕", "陈梦"];
            const metaFields = [
                { id: 'exam_date', label: '检查日期', type: 'date' },
                { id: 'investigator', label: '研究者', type: 'select', options: invOpts },
                { id: 'examiner', label: '检查者', type: 'select', options: examinerOpts },
                { id: 'record_date', label: '记录日期', type: 'date' },
                { id: 'recorder', label: '记录者', type: 'text' }
            ];
            if (currentVisit === 'v0') {
                metaFields.push({ id: 'consent_date', label: '签署知情同意书日期', type: 'date' });
            }
            
            html += renderMetaCard(metaFields);
            const anchors = [{ id: 'sec-meta', title: '记录信息' }];

            schemaToRender.forEach((sec, idx) => {
                const anchorId = `sec-${idx+1}`;
                anchors.push({ id: anchorId, title: sec.title });
                
                html += `<div id="${anchorId}" class="bg-white border border-gray-200 rounded-lg overflow-hidden mb-6 shadow-sm transition-all hover:shadow-md">
                            <div class="bg-gray-50/80 px-5 py-3 border-b border-gray-200 font-bold text-gray-800 flex items-center">
                                <div class="w-1 h-4 bg-blue-600 rounded mr-3"></div>${sec.title}
                            </div>
                            <div class="p-6">`;
                
                if (sec.type === 'criteria') html += renderCriteria(sec);
                else if (sec.type === 'grid') html += renderGrid(sec);
                else if (sec.type === 'eye_grid') html += renderEyeGrid(sec);
                else if (sec.type === 'eye_grid_plus') html += renderEyeGridPlus(sec);
                else if (sec.type === 'matrix') html += renderMatrix(sec);
                else if (sec.type === 'exceptions') html += renderExceptions(sec);
                
                html += `   </div>
                        </div>`;
            });
            
            container.innerHTML = html;
            renderTOC(anchors);

                    <label class="text-sm font-medium text-gray-600 mb-1.5 flex items-center">

                    if (f.type === 'radio_with_input') {
                        const inputVal = formData[f.inputId] || '--';
                        html += `<div class="py-2 text-sm font-medium text-gray-900 border-b border-gray-100 min-h-[36px]">${val || '--'} ${val === '有' ? `<span class="text-gray-400 ml-2">| ${f.inputLabel}: <span class="text-gray-900">${inputVal}</span></span>` : ''}</div>`;

                                <td class="py-2 px-4 border-l border-gray-100">
                                    <div class="flex items-center gap-3">
                                        ${row.options.map(opt => `<label class="flex items-center gap-1 text-sm"><input type="radio" name="${row.id_os}" value="${opt}" ${valOS===opt?'checked':''} class="text-green-600"> ${opt}</label>`).join('')}
                                    </div>
                                </td>`;
                    } else if (row.type === 'select') {
                        const makeOpts = (opts, val) => (opts||[]).map(o => {
                            const v = (typeof o === 'object') ? (o.v ?? o.value ?? o.label) : o;
                            const l = (typeof o === 'object') ? (o.l ?? o.label ?? o.v) : o;
                            return `<option value="${v}" ${val===v?'selected':''}>${l}</option>`;
                        }).join('');
                        html += `<td class="py-2 px-4 border-l border-gray-100"><select name="${row.id_od}" class="border border-gray-300 rounded p-1.5 text-sm w-full focus:ring-2 focus:ring-blue-500 outline-none">${makeOpts(row.options, valOD)}</select></td>
                                 <td class="py-2 px-4 border-l border-gray-100"><select name="${row.id_os}" class="border border-gray-300 rounded p-1.5 text-sm w-full focus:ring-2 focus:ring-green-500 outline-none">${makeOpts(row.options, valOS)}</select></td>`;
                    } else {
                        html += `<td class="py-2 px-4 border-l border-gray-100"><input type="${row.type}" step="${row.step||'any'}" name="${row.id_od}" value="${valOD}" class="border border-gray-300 rounded p-1.5 text-sm w-full focus:ring-2 focus:ring-blue-500 outline-none"></td>
                                 <td class="py-2 px-4 border-l border-gray-100"><input type="${row.type}" step="${row.step||'any'}" name="${row.id_os}" value="${valOS}" class="border border-gray-300 rounded p-1.5 text-sm w-full focus:ring-2 focus:ring-green-500 outline-none"></td>`;
                    }
                } else {
                    if (row.type === 'radio_with_input') {
                        const odExtra = valOD === '其他' ? ` <span class="text-gray-400 ml-1">| ${row.inputLabel}: <span class="text-gray-900">${formData[row.inputId_od]||'--'}</span></span>` : '';
                        const osExtra = valOS === '其他' ? ` <span class="text-gray-400 ml-1">| ${row.inputLabel}: <span class="text-gray-900">${formData[row.inputId_os]||'--'}</span></span>` : '';
                        html += `<td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${valOD || '<span class="text-gray-300">--</span>'}${valOD?odExtra:''}</td>
                                 <td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${valOS || '<span class="text-gray-300">--</span>'}${valOS?osExtra:''}</td>`;
                    } else if (row.type === 'select') {
                        const labelFor = (opts, v) => {
                            if (!opts) return v || '<span class="text-gray-300">--</span>';
                            const found = opts.find(o => (typeof o === 'object' ? (o.v ?? o.value ?? o.label) : o) === v);
                            const lbl = found ? (typeof found === 'object' ? (found.l ?? found.label ?? found.v) : found) : v;
                            return lbl || '<span class="text-gray-300">--</span>';
                        };
                        html += `<td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${labelFor(row.options, valOD)}</td>
                                 <td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${labelFor(row.options, valOS)}</td>`;
                    } else {
                        html += `<td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${valOD || '<span class="text-gray-300">--</span>'}</td>
                                 <td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${valOS || '<span class="text-gray-300">--</span>'}</td>`;
                    }
                }
                html += `</tr>`;
            });
            return html + `</tbody></table>`;
        }

        function renderEyeGridPlus(sec) {
            let html = renderEyeGrid({ rows: sec.rows });
            if (sec.sharedFields && sec.sharedFields.length > 0) {
                html += `<div class="mt-4 pt-4 border-t border-gray-200"><div class="text-sm font-semibold text-gray-700 mb-3">共用信息</div>`;
                html += renderGrid({ fields: sec.sharedFields });
                html += `</div>`;
            }
            return html;
        }

        function renderMatrix(sec) {
            let html = `<div class="overflow-x-auto"><table class="w-full text-left border-collapse">
                <thead><tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
                    <th class="py-3 px-4 font-medium w-24">眼别</th>
                    ${sec.cols.map(c => `<th class="py-3 px-4 font-medium border-l border-gray-200">${c.label}</th>`).join('')}
                </tr></thead><tbody class="divide-y divide-gray-100">`;
            sec.rows.forEach(r => {
                html += `<tr><td class="py-3 px-4 text-sm font-medium text-gray-700">${r.label}</td>`;
                sec.cols.forEach(c => {
                    const fid = `${r.id}_${c.id}`;
                    const val = formData[fid] || '';
                    if (isEditMode) {
                        const stepAttr = sec.cellType === 'number' ? ` step="${sec.step || 'any'}"` : '';
                        html += `<td class="py-2 px-4 border-l border-gray-100"><input type="${sec.cellType || 'text'}"${stepAttr} name="${fid}" value="${val}" class="border border-gray-300 rounded p-1.5 text-sm w-full focus:ring-2 focus:ring-blue-500 outline-none"></td>`;
                    } else {
                        html += `<td class="py-3 px-4 border-l border-gray-100 text-sm text-gray-900">${val || '<span class="text-gray-300">--</span>'}</td>`;
                    }
                });
                html += `</tr>`;
            });
            return html + `</tbody></table></div>`;
        }

        function renderTOC(anchors) {
            const toc = document.getElementById('toc-nav');
            if (!toc) return;
            window.__tocAnchors = anchors || [];
            toc.innerHTML = (anchors || []).map((a, i) => {
                const isMeta = a.id === 'sec-meta';
                const label = a.title;
                const baseCls = "w-full text-left px-3 py-2 rounded transition";
                const restCls = isMeta ? "font-semibold text-gray-800" : "text-gray-700";
                return `<button data-anchor="${a.id}" onclick="scrollToAnchor('${a.id}')" class="${baseCls} ${restCls} hover:bg-blue-50 hover:text-blue-700 whitespace-nowrap">${label}</button>`;
            }).join('');
            setActiveTOC((anchors && anchors.length) ? anchors[0].id : null);
            initTOCScrollSync();
        }

        function scrollToAnchor(id) {
            const container = document.getElementById('form-scroll-container');
            const el = document.getElementById(id);
            if (!container || !el) return;
            const cTop = container.getBoundingClientRect().top;
            const eTop = el.getBoundingClientRect().top;
            const offset = 8; // 微调
            container.scrollBy({ top: eTop - cTop - offset, behavior: 'smooth' });
        }

        function setActiveTOC(id) {
            const toc = document.getElementById('toc-nav');
            if (!toc) return;
            toc.querySelectorAll('button[data-anchor]').forEach(btn => {
                const active = btn.getAttribute('data-anchor') === id;
                btn.classList.toggle('bg-blue-50', active);
                btn.classList.toggle('text-blue-700', active);
                btn.classList.toggle('font-semibold', active);
            });
        }

        function initTOCScrollSync() {
            if (window.__tocScrollInited) return;
            const container = document.getElementById('form-scroll-container');
            if (!container) return;
            const onScroll = () => {
                const anchors = window.__tocAnchors || [];
                if (!anchors.length) return;
                const cTop = container.getBoundingClientRect().top;
                let bestId = anchors[0].id;
                let bestDelta = Infinity;
                anchors.forEach(a => {
                    const el = document.getElementById(a.id);
                    if (!el) return;
                    const delta = Math.abs(el.getBoundingClientRect().top - cTop - 8);
                    if (delta < bestDelta) { bestDelta = delta; bestId = a.id; }
                });
                setActiveTOC(bestId);
            };
            container.addEventListener('scroll', onScroll);
            window.__tocScrollInited = true;
        }

        function renderDynamicTableReadOnly(f) {
            const list = formData[f.listId] || [];
            if (list.length === 0) return `<div class="text-sm text-gray-400 italic bg-gray-50 p-3 rounded">暂无记录</div>`;
            let html = `<div class="overflow-x-auto border border-gray-200 rounded-md mt-2"><table class="w-full text-left text-sm"><thead class="bg-gray-100 text-gray-600"><tr class="divide-x divide-gray-200">`;
            f.columns.forEach(col => html += `<th class="py-2 px-3 font-medium">${col.label}</th>`);
            html += `</tr></thead><tbody class="divide-y divide-gray-200">`;
            list.forEach(row => {
                html += `<tr class="divide-x divide-gray-100 hover:bg-gray-50">`;
                f.columns.forEach(col => {
                    let text = row[col.id] || '--';
                    if (col.id === 'eye') text = {1:'右眼', 2:'左眼', 3:'双眼', 4:'NA'}[text] || text;
                    if (col.dependsOn && row[col.dependsOn] !== col.dependsVal) text = '--';
                    html += `<td class="py-2 px-3 text-gray-800">${text}</td>`;
                });
                html += `</tr>`;
            });
            return html + `</tbody></table></div>`;
        }

        function renderDynamicTableEdit(f) {
            const list = formData[f.listId] || [];
            let html = `<div class="border border-blue-200 rounded-md mt-2 overflow-hidden fade-in"><table class="w-full text-left text-sm bg-white"><thead class="bg-blue-50 text-blue-800"><tr class="divide-x divide-blue-100">`;
            f.columns.forEach(col => html += `<th class="py-2 px-3 font-medium ${col.width}">${col.label}</th>`);
            html += `<th class="py-2 px-3 font-medium w-16 text-center">操作</th></tr></thead><tbody class="divide-y divide-gray-200">`;
            list.forEach((row, index) => {
                html += `<tr class="divide-x divide-gray-100">`;
                f.columns.forEach(col => {
                    const val = row[col.id] || '';
                    const isHidden = col.dependsOn && row[col.dependsOn] !== col.dependsVal;
                    html += `<td class="py-2 px-2">`;
                    if (!isHidden) {
                        if (col.type === 'select') {
                            html += `<select onchange="updateList('${f.listId}', ${index}, '${col.id}', this.value)" class="w-full border border-gray-300 rounded p-1.5 focus:ring-1 focus:ring-blue-500 outline-none"><option value="">请选择</option>${col.options.map(o => `<option value="${o.v}" ${val===o.v?'selected':''}>${o.l}</option>`).join('')}</select>`;
                        } else {
                            html += `<input type="${col.type}" value="${val}" onchange="updateList('${f.listId}', ${index}, '${col.id}', this.value)" class="w-full border border-gray-300 rounded p-1.5 focus:ring-1 focus:ring-blue-500 outline-none">`;
                        }
                    } else { html += `<div class="text-gray-300 text-center bg-gray-50 rounded p-1.5">不适用</div>`; }
                    html += `</td>`;
                });
                html += `<td class="py-2 px-2 text-center"><button onclick="removeListRow('${f.listId}', ${index})" class="text-red-500 hover:text-red-700 font-bold px-2 py-1 rounded hover:bg-red-50 transition">×</button></td></tr>`;
            });
            html += `</tbody></table><div class="bg-gray-50 p-2 border-t border-gray-200"><button onclick="addListRow('${f.listId}')" class="text-sm text-blue-600 hover:text-blue-800 font-medium flex items-center px-2 py-1 rounded hover:bg-blue-100 transition"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>新增一条记录</button></div></div>`;
            return html;
        }

        function updateList(listId, index, key, value) { formData[listId][index][key] = value; renderForm(); }
        function addListRow(listId) { if(!formData[listId]) formData[listId] = []; formData[listId].push({}); renderForm(); }
        function removeListRow(listId, index) { formData[listId].splice(index, 1); renderForm(); }

    </script>
</body>
</html>
